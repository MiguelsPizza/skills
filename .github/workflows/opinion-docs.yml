name: Opinion Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/audit-opinions.mjs
      - run: node scripts/verify-opinion-example-metadata.mjs
      - run: node scripts/find-duplicate-opinion-text.mjs
      - run: node scripts/check-markdown-links.mjs
