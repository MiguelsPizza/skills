name: Opinion Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit opinion structure
        run: node scripts/audit-opinions.mjs
      - name: Verify example metadata
        run: node scripts/verify-opinion-example-metadata.mjs
      - name: Check duplicate opinion text
        run: node scripts/find-duplicate-opinion-text.mjs
      - name: Check markdown links
        run: node scripts/check-markdown-links.mjs
